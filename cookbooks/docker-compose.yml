services:
  fake-sentry:
    image: ruby:3.3-alpine
    working_dir: /app
    command: sh -c "gem install webrick --no-document && ruby fake_service.rb"
    environment:
      FAKE_SERVICE_NAME: fake-sentry
      FAKE_SERVICE_PORT: 4010
    ports:
      - "${FAKE_SENTRY_PORT:-4010}:4010"
    volumes:
      - ./fake_services:/app:ro

  fake-logs:
