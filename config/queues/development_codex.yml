name: Development Codex
slug: development-codex
stages:
  - intake
  - decompose
  - build
  - test
  - review
  - done
config:
  default_max_retries: 3
  default_timeout_seconds: 600
  default_escalation: block_and_notify
  max_regression_loops: 3
stage_configs:
  intake:
    adapter_type: inline_claude
    model_override: claude-3-5-sonnet-latest
    allowed_skills:
      - read_spec
      - classify
      - tag_work_item
    forbidden_skills: []
    max_retries: 1
    escalation_target: block_and_notify
    completion_criteria:
      - report_present
    agent_prompt: file://prompts/development_intake.md
    timeout_seconds: 600
    adapter_config:
      command: claude
      args:
        - --print
      output_artifact_kind: agent_report
  decompose:
    adapter_type: inline_claude
    model_override: claude-3-5-sonnet-latest
    allowed_skills:
      - read_spec
      - create_child_items
      - define_acceptance_criteria
    forbidden_skills: []
    max_retries: 2
    escalation_target: block_and_notify
    completion_criteria:
      - report_present
    agent_prompt: file://prompts/development_decompose.md
    timeout_seconds: 600
    adapter_config:
      command: claude
      args:
        - --print
      output_artifact_kind: agent_report
  build:
    adapter_type: codex
    model_override: codex-cli
    allowed_skills:
      - clone_repo
      - create_branch
      - edit_files
      - run_tests
    forbidden_skills:
      - deploy
      - merge_main
      - mutate_database
    max_retries: 3
    escalation_target: block_and_notify
    completion_criteria:
      - branch_created
      - report_present
    agent_prompt: file://prompts/development_build.md
    timeout_seconds: 600
    adapter_config:
      command: codex
      args:
        - exec
        - --json
      poll_command: codex
      poll_args:
        - status
        - --json
  test:
    adapter_type: shell_script
    model_override: local-shell
    allowed_skills:
      - run_tests
      - run_linter
      - run_coverage
    forbidden_skills:
      - edit_files
    max_retries: 1
    escalation_target: block_and_notify
    completion_criteria:
      - tests_passed
      - lint_clean
      - coverage_not_decreased
    agent_prompt: file://prompts/development_test.md
    timeout_seconds: 600
    adapter_config:
      commands:
        - name: rspec
          command: ruby -e 'exit 0'
          artifact: test_results
        - name: rubocop
          command: ruby -e 'exit 0'
          artifact: lint
        - name: coverage-placeholder
          command: ruby -e 'exit 0'
          artifact: coverage
          previous_coverage: 0.0
          current_coverage: 0.0
  review:
    adapter_type: inline_claude
    model_override: claude-3-5-sonnet-latest
    allowed_skills:
      - read_diff
      - read_spec
      - approve
      - request_changes
    forbidden_skills: []
    max_retries: 0
    escalation_target: block_and_notify
    completion_criteria:
      - review_verdict
    agent_prompt: file://prompts/development_review.md
    timeout_seconds: 600
    adapter_config:
      command: claude
      args:
        - --print
      output_artifact_kind: agent_report
  done:
    adapter_type: fake
    model_override: fake-terminal
    allowed_skills: []
    forbidden_skills: []
    max_retries: 0
    escalation_target: block_and_notify
    completion_criteria:
      - report_present
    agent_prompt: Terminal state.
    timeout_seconds: 60
