services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://stupidclaw:stupidclaw@postgres:5432/stupidclaw_development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: stupidclaw
      POSTGRES_PASSWORD: stupidclaw
      POSTGRES_DB: stupidclaw_development
    ports:
      - "3333:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/rails/tui/node_modules

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stupidclaw
      POSTGRES_PASSWORD: stupidclaw
      POSTGRES_DB: stupidclaw_development
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stupidclaw -d stupidclaw_development"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  bundle_cache:
  node_modules_cache:
  postgres_data:
