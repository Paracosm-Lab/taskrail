steps:
  lint:
    image: ruby:3.2.0
    commands:
      - apt-get update -qq
      - apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config
      - bundle install --jobs 4 --retry 3
      - bin/rubocop --fail-level warning --except Layout
    when:
      event: [push, pull_request]

  format:
    image: ruby:3.2.0
    commands:
      - apt-get update -qq
      - apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config
      - bundle install --jobs 4 --retry 3
      - bin/rubocop --fail-level warning --only Layout
    depends_on:
      - lint
    when:
      event: [push, pull_request]

  secret-scan:
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose --no-banner
    depends_on:
      - lint
    when:
      event: [push, pull_request]

  # Type checking: not yet configured. Add Sorbet or Steep when warranted.
  security_scan:
    image: ruby:3.2.0
    commands:
      - apt-get update -qq
      - apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config
      - bundle install --jobs 4 --retry 3
      - bin/brakeman --no-pager
    depends_on:
      - format
      - secret-scan
    when:
      event: [push, pull_request]

  test_ruby:
    image: ruby:3.2.0
    environment:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/taskrail_test
    commands:
      - apt-get update -qq
      - apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config
      - bundle install --jobs 4 --retry 3
      - bin/rails db:test:prepare test
    depends_on:
      - security_scan
    when:
      event: [push, pull_request]

  test_tui:
    image: node:20
    commands:
      - cd tui
      - npm ci
      - npm test
    depends_on:
      - security_scan
    when:
      event: [push, pull_request]

  test:
    image: alpine:3.20
    commands:
      - echo "test gate passed"
    depends_on:
      - test_ruby
      - test_tui
    when:
      event: [push, pull_request]

  sbom:
    image: anchore/syft:latest
    commands:
      - syft dir:. -o cyclonedx-json > sbom.json
    depends_on:
      - test
    failure: ignore
    when:
      event: [push, pull_request]

  sbom_upload:
    image: alpine:3.20
    environment:
      NAS_SSH_KEY:
        from_secret: nas_ssh_key
      NAS_HOST: 192.168.10.22
      NAS_USER: admin
      NAS_ARTIFACT_ROOT: /share/Public/taskrail/sbom
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - printf "%s" "$NAS_SSH_KEY" > ~/.ssh/nas_ed25519
      - chmod 600 ~/.ssh/nas_ed25519
      - ssh-keyscan -H "$NAS_HOST" >> ~/.ssh/known_hosts
      - ssh -i ~/.ssh/nas_ed25519 "$NAS_USER@$NAS_HOST" "mkdir -p '$NAS_ARTIFACT_ROOT/$CI_COMMIT_SHA'"
      - scp -i ~/.ssh/nas_ed25519 sbom.json "$NAS_USER@$NAS_HOST:$NAS_ARTIFACT_ROOT/$CI_COMMIT_SHA/sbom.json"
    depends_on:
      - sbom
    failure: ignore
    when:
      event: [push, manual]

  docker_build_pr:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: 192.168.1.76:5000/taskrail
      dry_run: true
      dockerfile: Dockerfile
    depends_on:
      - test
    when:
      event: [pull_request]

  docker_build_main:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: 192.168.1.76:5000/taskrail
      dry_run: false
      dockerfile: Dockerfile
      tags:
        - latest
        - ${CI_COMMIT_SHA}
    depends_on:
      - test
    when:
      event: [push]
      branch: [main]

  deploy_main:
    image: ruby:3.2.0
    environment:
      BASE_URL:
        from_secret: production_base_url
      KAMAL_REGISTRY_PASSWORD:
        from_secret: kamal_registry_password
      KAMAL_SSH_KEY:
        from_secret: kamal_ssh_key
    commands:
      - apt-get update -qq
      - apt-get install --no-install-recommends -y build-essential git openssh-client curl
      - bundle install --jobs 4 --retry 3
      - mkdir -p ~/.ssh
      - printf "%s" "$KAMAL_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - bin/kamal deploy
      - BASE_URL="$BASE_URL" bin/monitor-prod
    depends_on:
      - docker_build_main
    when:
      event: [push]
      branch: [main]

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskrail_test
